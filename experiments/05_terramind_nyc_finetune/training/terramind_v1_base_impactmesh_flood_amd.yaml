# Edited from IBM's reference config:
#   ibm-esa-geospatial/TerraMind-base-Flood/terramind_v1_base_impactmesh_flood.yaml
# Changes:
#   - WandbLogger -> CSVLogger (no wandb account / no network)
#   - data_root + splits -> absolute paths inside terramind container
#   - ModelCheckpoint dirpath -> /root/terramind_nyc/output/...
#   - default_root_dir -> /root/terramind_nyc/output/...

# lightning.pytorch==2.1.1
seed_everything: 42
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: 16-mixed
  logger:
    class_path: lightning.pytorch.loggers.CSVLogger
    init_args:
      save_dir: /root/terramind_nyc/output/terramind_base_impactmesh_flood/logs
      name: amd_repro_lr1e-4
  callbacks:
    - class_path: RichProgressBar
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: EarlyStopping
      init_args:
        monitor: val/loss
        patience: 10
    - class_path: ModelCheckpoint
      init_args:
        monitor: val/loss
        mode: min
        save_weights_only: true
        dirpath: /root/terramind_nyc/output/terramind_base_impactmesh_flood/ckpt
        filename: best_val_loss
  max_epochs: 50
  log_every_n_steps: 5
  default_root_dir: /root/terramind_nyc/output/terramind_base_impactmesh_flood/
data:
  class_path: impactmesh.impactmesh_datamodule.ImpactMeshDataModule
  init_args:
    batch_size: 16
    num_workers: 8
    data_root: /root/.cache/huggingface/ImpactMesh-Flood/data
    train_split: /root/.cache/huggingface/ImpactMesh-Flood/split/impactmesh_flood_train.txt
    val_split: /root/.cache/huggingface/ImpactMesh-Flood/split/impactmesh_flood_val.txt
    test_split: /root/.cache/huggingface/ImpactMesh-Flood/split/impactmesh_flood_test.txt
    timesteps: [0, 1, 2, 3]
    modalities:
        - S2L2A
        - S1RTC
        - DEM
    no_data_replace: 0
    train_transform:
      - class_path: terratorch.datasets.transforms.FlattenTemporalIntoChannels
      - class_path: albumentations.D4
      - class_path: albumentations.pytorch.ToTensorV2
      - class_path: terratorch.datasets.transforms.UnflattenTemporalFromChannels
        init_args:
          n_timesteps: 4

model:
  class_path: terratorch.tasks.SemanticSegmentationTask
  init_args:
    model_factory: EncoderDecoderFactory
    model_args:
      backbone: terramind_v1_base
      backbone_pretrained: true
      backbone_modalities:
        - S2L2A
        - S1RTC
        - DEM
      backbone_use_temporal: true
      backbone_temporal_pooling: concat
      backbone_temporal_n_timestamps: 4

      necks:
        - name: SelectIndices
          indices: [2, 5, 8, 11]
        - name: ReshapeTokensToImage
          remove_cls_token: False
        - name: LearnedInterpolateToPyramidal

      decoder: UNetDecoder
      decoder_channels: [512, 256, 128, 64]

      head_dropout: 0.1
      num_classes: 2
    loss: dice
    ignore_index: -1
    freeze_backbone: false
    freeze_decoder: false
    class_weights: [0.342, 1.316]
    tiled_inference_parameters:
      crop: 256
      stride: 208
      batch_size: 64
      delta: 8

optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 1.e-4
lr_scheduler:
  class_path: ReduceLROnPlateau
  init_args:
    monitor: val/loss
    factor: 0.5
    patience: 2
