id: nws_obs
type: live
title: NWS hourly METAR observations (nearest station)
stone: touchstone
tier: empirical
adapter: python_call

# Federal pebble — api.weather.gov resolves any CONUS lat/lon to its
# nearest METAR station, so a single manifest serves every spatially-
# routed deployment.
coverage:
  region: us_conus

spatial:
  scope: point
  crs: EPSG:4326

config:
  module: app.context.nws_obs
  function: summary_for_point
  args:
    - {source: lat}
    - {source: lon}
  on_none: passthrough

trace_summary:
  station: station_id
  p1h_mm: precip_last_hour_mm
  p6h_mm: precip_last_6h_mm

provenance:
  source_name: National Weather Service (NOAA) — nearest METAR station
  source_url: https://api.weather.gov/
  license: U.S. Public Domain
  doc_id: nws_obs
  citation: NWS hourly METAR observations, nearest station to address.

narration:
  short: Most recent National Weather Service hourly observation at the nearest METAR station.
  template: "{narrative}"

fallback:
  on_offline: skip
  message: NWS api.weather.gov unreachable.

display:
  variant: scalars
  order: 30
  kind: text
  map_layer: false
  icon: "🌦️"
